services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poster
      POSTGRES_PASSWORD: poster
      POSTGRES_DB: poster_generator
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  tunnel:
    build: ./tunnel
    command: ["root@109.199.96.162"]
    volumes:
      - ~/.ssh:/root/.ssh:ro
    profiles:
      - dev
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8003}:8000"
    volumes:
      - /var/www/dovshop/media:/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LEONARDO_API_KEY=${LEONARDO_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PRINTIFY_API_TOKEN=${PRINTIFY_API_TOKEN}
      - PRINTIFY_SHOP_ID=${PRINTIFY_SHOP_ID}
      - ETSY_API_KEY=${ETSY_API_KEY}
      - ETSY_SHARED_SECRET=${ETSY_SHARED_SECRET}
      - ETSY_REDIRECT_URI=${ETSY_REDIRECT_URI:-http://localhost:8001/etsy/callback}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DOVSHOP_API_KEY=${DOVSHOP_API_KEY}
      - DOVSHOP_API_URL=${DOVSHOP_API_URL}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
    deploy:
      update_config:
        order: start-first
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8003}
    ports:
      - "${FRONTEND_PORT:-3003}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8003}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      update_config:
        order: start-first
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  pg_data:
